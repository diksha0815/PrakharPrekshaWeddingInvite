<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preksha & Prakhar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Great+Vibes&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="grain"></div>

  <main>
    <section class="hero" id="hero">
      <div class="paper-texture"></div>
      <div class="envelope-wrap" id="openInvite" role="button" tabindex="0" aria-label="Open invitation">
        <div class="envelope">
          <div class="flap flap-top"></div>
          <div class="flap flap-right"></div>
          <div class="flap flap-left"></div>
          <div class="letter-preview">
            <p>Requests the pleasure<br>of your company</p>
          </div>
          <div class="seal">
            <span>PJ</span>
            <small>❦</small>
          </div>
        </div>
        <p class="tap-text">Tap to open</p>
      </div>
    </section>

    <section class="content" id="content">
      <div class="section-heading reveal">
        <span>Wedding Favourites</span>
        <h1>Preksha & Prakhar</h1>
      </div>

      <article class="invite-card reveal">
        <img src="assets/prakhar-fav.jpeg" alt="Prakhar's Favourite" />
      </article>

      <article class="invite-card reveal delay">
        <img src="assets/preksha-fav.jpeg" alt="Preksha's Fav" />
      </article>
    </section>
  </main>

  <button class="scroll-top" id="scrollTop" aria-label="Back to top">↑</button>

  <script src="script.js"></script>
</body>
</html>
